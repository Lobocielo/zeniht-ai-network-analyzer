<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ZENIHT AI - Analizador de Red</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#00f0ff">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <!-- LOGIN / REGISTER -->
    <div id="authScreen" class="screen active">
        <div class="auth-container">
            <div class="auth-logo">
                <div class="logo-icon">Z</div>
                <h1>ZENIHT AI</h1>
                <p>Analizador de Red con IA</p>
            </div>
            <div id="authForm">
                <div class="input-group">
                    <input type="text" id="authUser" placeholder="Usuario" autocomplete="username">
                </div>
                <div class="input-group">
                    <input type="password" id="authPass" placeholder="Password" autocomplete="current-password">
                </div>
                <button class="btn-primary" id="btnLogin" onclick="doLogin()">Entrar</button>
                <button class="btn-secondary" id="btnRegister" onclick="doRegister()">Crear Cuenta</button>
                <div id="authError" class="error-msg"></div>
            </div>
        </div>
    </div>

    <!-- DASHBOARD -->
    <div id="dashboardScreen" class="screen">
        <header class="header">
            <div class="header-left">
                <div class="logo-sm">Z</div>
                <div>
                    <div class="header-title">ZENIHT AI</div>
                    <div class="header-sub" id="headerStatus">Conectando...</div>
                </div>
            </div>
            <div class="header-right">
                <div class="threat-badge" id="threatBadge">SAFE</div>
                <button class="btn-icon" onclick="doLogout()">&#x2190;</button>
            </div>
        </header>

        <div class="content">
            <!-- Stats -->
            <div class="stats-row">
                <div class="stat-card">
                    <div class="stat-val" id="sPackets">0</div>
                    <div class="stat-lbl">Paquetes</div>
                </div>
                <div class="stat-card">
                    <div class="stat-val danger" id="sAnomalies">0</div>
                    <div class="stat-lbl">Anomalias</div>
                </div>
                <div class="stat-card">
                    <div class="stat-val warn" id="sCritical">0</div>
                    <div class="stat-lbl">Criticos</div>
                </div>
                <div class="stat-card">
                    <div class="stat-val ok" id="sHealth">100</div>
                    <div class="stat-lbl">Salud</div>
                </div>
            </div>

            <!-- AI Status -->
            <div class="card">
                <div class="card-title">&#x1F9E0; Estado del Modelo AI</div>
                <div class="ai-status">
                    <div class="ai-info">
                        <span>Epoch: <b id="aiEpoch">0</b></span>
                        <span>Loss: <b id="aiLoss">-</b></span>
                        <span>Umbral: <b id="aiThreshold">-</b></span>
                    </div>
                    <div class="ai-bar">
                        <div class="ai-bar-fill" id="aiProgress" style="width:0%"></div>
                    </div>
                    <div class="ai-controls">
                        <button class="btn-sm" onclick="startTraining()">Entrenar</button>
                        <button class="btn-sm" onclick="saveModelGithub()">Guardar en GitHub</button>
                        <button class="btn-sm" onclick="loadModelGithub()">Cargar de GitHub</button>
                    </div>
                </div>
            </div>

            <!-- Tabs -->
            <div class="tabs">
                <button class="tab active" data-tab="hosts">Hosts</button>
                <button class="tab" data-tab="flows">Flujos</button>
                <button class="tab" data-tab="networks">Redes</button>
                <button class="tab" data-tab="events">Eventos</button>
                <button class="tab" data-tab="scan">Escanear</button>
            </div>

            <!-- Tab: Hosts -->
            <div class="tab-panel active" id="panel-hosts">
                <div class="card">
                    <div class="card-title">Hosts Detectados</div>
                    <div id="hostsList" class="list-container"></div>
                </div>
            </div>

            <!-- Tab: Flows -->
            <div class="tab-panel" id="panel-flows">
                <div class="card">
                    <div class="card-title">Flujos de Red</div>
                    <div id="flowsList" class="list-container"></div>
                </div>
            </div>

            <!-- Tab: Networks -->
            <div class="tab-panel" id="panel-networks">
                <div class="card">
                    <div class="card-title">Redes Descubiertas</div>
                    <div id="networksList" class="list-container"></div>
                </div>
            </div>

            <!-- Tab: Events -->
            <div class="tab-panel" id="panel-events">
                <div class="card">
                    <div class="card-title">Eventos de Seguridad</div>
                    <div id="eventsList" class="list-container"></div>
                </div>
            </div>

            <!-- Tab: Scan -->
            <div class="tab-panel" id="panel-scan">
                <div class="card">
                    <div class="card-title">Escanear Red</div>
                    <div class="scan-controls">
                        <input type="text" id="scanTarget" placeholder="IP o Subred (ej: 192.168.1.0/24)">
                        <select id="scanType">
                            <option value="ping">Ping</option>
                            <option value="tcp">TCP Scan</option>
                            <option value="trace">Traceroute</option>
                        </select>
                        <button class="btn-primary" onclick="startScan()">Escanear</button>
                    </div>
                    <div id="scanResults" class="list-container"></div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.17.0/dist/tf.min.js"></script>
    <script src="js/ai.js"></script>
    <script src="js/network.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
